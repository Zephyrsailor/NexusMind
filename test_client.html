<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMind WebSocket 测试客户端</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.connected { background: #c6f6d5; color: #22543d; }
        .status.disconnected { background: #fed7d7; color: #742a2a; }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #4a5568;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
            margin: 5px 0;
        }
        button:hover {
            background: #5a67d8;
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            padding: 15px;
            background: #f7fafc;
            margin-top: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            background: white;
        }
        .message-time {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .examples {
            margin-top: 20px;
        }
        .example-btn {
            background: #48bb78;
            margin: 5px 5px 5px 0;
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            display: inline-block;
        }
        .example-btn:hover {
            background: #38a169;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 NexusMind WebSocket 测试客户端</h1>
        
        <div id="status" class="status disconnected">
            ❌ 未连接到服务器
        </div>
        
        <div class="input-group">
            <label for="serverUrl">服务器地址:</label>
            <input type="text" id="serverUrl" value="ws://localhost:8080/ws/test-client" 
                   placeholder="WebSocket服务器地址">
        </div>
        
        <button id="connectBtn">🔌 连接服务器</button>
        <button id="disconnectBtn" disabled>⏹️ 断开连接</button>
        
        <div class="input-group">
            <label for="messageInput">发送消息:</label>
            <textarea id="messageInput" rows="3" 
                      placeholder="输入您想要发送给NexusMind的消息..."></textarea>
        </div>
        
        <button id="sendBtn" disabled>📤 发送消息</button>
        
        <div class="examples">
            <label>💡 快速测试示例:</label><br>
            <button class="example-btn" onclick="setMessage('你好，我是新用户')">基础对话</button>
            <button class="example-btn" onclick="setMessage('请计算 2 + 3 * 4')">数学计算</button>
            <button class="example-btn" onclick="setMessage('请分析这段文本：Hello world! 联系邮箱：test@example.com')">文本分析</button>
            <button class="example-btn" onclick="setMessage('分析文本 计算 5 + 7 并执行计算')">混合任务</button>
        </div>
        
        <div class="messages" id="messages">
            <div class="message">
                <div class="message-time">系统消息</div>
                <div class="message-content">欢迎使用NexusMind测试客户端！请先连接到服务器。</div>
            </div>
        </div>
    </div>

    <script>
        let websocket = null;
        let isConnected = false;

        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const messagesDiv = document.getElementById('messages');
        const serverUrl = document.getElementById('serverUrl');

        function updateStatus(connected, message) {
            isConnected = connected;
            statusDiv.className = `status ${connected ? 'connected' : 'disconnected'}`;
            statusDiv.textContent = `${connected ? '✅' : '❌'} ${message}`;
            
            connectBtn.disabled = connected;
            disconnectBtn.disabled = !connected;
            sendBtn.disabled = !connected;
        }

        function addMessage(type, content, time = new Date()) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = `[${type}] ${time.toLocaleTimeString()}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(timeDiv);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            try {
                websocket = new WebSocket(serverUrl.value);
                
                websocket.onopen = function() {
                    updateStatus(true, '已连接到NexusMind服务器');
                    addMessage('连接', '成功连接到服务器');
                };
                
                websocket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        let message = '';
                        
                        switch(data.type) {
                            case 'connection':
                                message = `连接确认: ${data.message}`;
                                break;
                            case 'task_started':
                                message = `任务开始: ${data.message} (ID: ${data.task_id})`;
                                break;
                            case 'task_completed':
                                message = `任务完成: ${data.message}\n`;
                                if (data.payload && data.payload.reply_message) {
                                    message += `回复: ${data.payload.reply_message}`;
                                }
                                break;
                            case 'error':
                                message = `错误: ${data.message}`;
                                break;
                            case 'pong':
                                message = `心跳响应: ${data.timestamp}`;
                                break;
                            default:
                                message = `未知消息类型: ${JSON.stringify(data, null, 2)}`;
                        }
                        
                        addMessage('接收', message);
                    } catch (e) {
                        addMessage('接收', `原始消息: ${event.data}`);
                    }
                };
                
                websocket.onclose = function() {
                    updateStatus(false, '与服务器断开连接');
                    addMessage('系统', '连接已关闭');
                };
                
                websocket.onerror = function(error) {
                    updateStatus(false, '连接错误');
                    addMessage('错误', `WebSocket错误: ${error}`);
                };
                
            } catch (error) {
                addMessage('错误', `连接失败: ${error.message}`);
            }
        }

        function disconnect() {
            if (websocket) {
                websocket.close();
                websocket = null;
            }
        }

        function sendMessage() {
            if (!isConnected || !messageInput.value.trim()) {
                return;
            }
            
            const message = {
                type: "user_request",
                payload: {
                    message: messageInput.value.trim()
                }
            };
            
            try {
                websocket.send(JSON.stringify(message));
                addMessage('发送', messageInput.value.trim());
                messageInput.value = '';
            } catch (error) {
                addMessage('错误', `发送失败: ${error.message}`);
            }
        }

        function sendPing() {
            if (!isConnected) return;
            
            const ping = { type: "ping" };
            websocket.send(JSON.stringify(ping));
            addMessage('发送', 'Ping (心跳检测)');
        }

        function setMessage(text) {
            messageInput.value = text;
        }

        // 事件监听器
        connectBtn.onclick = connect;
        disconnectBtn.onclick = disconnect;
        sendBtn.onclick = sendMessage;

        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        // 定期发送心跳
        setInterval(() => {
            if (isConnected) {
                sendPing();
            }
        }, 30000);

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            addMessage('系统', 'WebSocket测试客户端已准备就绪！');
        });
    </script>
</body>
</html>
